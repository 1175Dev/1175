#
# ElevenSeventyFive builds ALL of its library dependencies from source with the
# in-tree `depends` system, for reproducibility (see the README). This CI compiles
# the full node, wallet and tooling that way on Linux — the build that matters for
# the fork.
#
# The upstream Bitcoin Core matrix (macOS / Win64 / fuzz / sanitizers) and the
# bitcoin-util golden-output test (`util_test_runner`) are stock-Bitcoin specific:
# the util fixtures under test/util/data hardcode Bitcoin addresses and must be
# regenerated for ElevenSeventyFive's address parameters before they can run green.
# That, and enabling the unit-test suite in CI, are tracked as follow-ups.

name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux-depends:
    name: 'Linux x86_64, depends build'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkgconf python3 curl bison \
            libtool automake autoconf patch xz-utils ca-certificates ccache

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sources
          key: depends-${{ runner.os }}-${{ hashFiles('depends/packages/**', 'depends/Makefile') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Build dependencies (depends system, no GUI)
        run: make -C depends NO_QT=1 -j"$(nproc)"

      - name: Configure
        run: cmake -B build --toolchain "$PWD/depends/$(depends/config.guess)/toolchain.cmake"

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Smoke test binaries
        run: |
          set -e
          for b in elevenseventyfived elevenseventyfive-cli elevenseventyfive-tx \
                   elevenseventyfive-util elevenseventyfive-wallet; do
            test -x "build/bin/$b" || { echo "missing binary: $b"; exit 1; }
          done
          ./build/bin/elevenseventyfived -version | head -1
          ./build/bin/elevenseventyfive-cli -version | head -1
