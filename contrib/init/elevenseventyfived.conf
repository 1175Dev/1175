description "ElevenSeventyFive Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env ELEVENSEVENTYFIVED_BIN="/usr/bin/elevenseventyfived"
env ELEVENSEVENTYFIVED_USER="elevenseventyfive"
env ELEVENSEVENTYFIVED_GROUP="elevenseventyfive"
env ELEVENSEVENTYFIVED_PIDDIR="/var/run/elevenseventyfived"
# upstart can't handle variables constructed with other variables
env ELEVENSEVENTYFIVED_PIDFILE="/var/run/elevenseventyfived/elevenseventyfived.pid"
env ELEVENSEVENTYFIVED_CONFIGFILE="/etc/elevenseventyfive/elevenseventyfive.conf"
env ELEVENSEVENTYFIVED_DATADIR="/var/lib/elevenseventyfived"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # elevenseventyfived will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$ELEVENSEVENTYFIVED_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run elevenseventyfived."
        echo "The setting must appear in $ELEVENSEVENTYFIVED_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"ElevenSeventyFive Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$ELEVENSEVENTYFIVED_PIDDIR"
    chmod 0755 "$ELEVENSEVENTYFIVED_PIDDIR"
    chown $ELEVENSEVENTYFIVED_USER:$ELEVENSEVENTYFIVED_GROUP "$ELEVENSEVENTYFIVED_PIDDIR"
    chown $ELEVENSEVENTYFIVED_USER:$ELEVENSEVENTYFIVED_GROUP "$ELEVENSEVENTYFIVED_CONFIGFILE"
    chmod 0660 "$ELEVENSEVENTYFIVED_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$ELEVENSEVENTYFIVED_PIDFILE" \
    --chuid $ELEVENSEVENTYFIVED_USER:$ELEVENSEVENTYFIVED_GROUP \
    --exec "$ELEVENSEVENTYFIVED_BIN" \
    -- \
    -pid="$ELEVENSEVENTYFIVED_PIDFILE" \
    -conf="$ELEVENSEVENTYFIVED_CONFIGFILE" \
    -datadir="$ELEVENSEVENTYFIVED_DATADIR" \
    -disablewallet \
    -daemon

